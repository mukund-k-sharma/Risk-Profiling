version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-topics-init:
    image: confluentinc/cp-kafka:7.0.1
    depends_on:
      - kafka
    entrypoint: >
      sh -c '
      echo "Waiting for Kafka to be ready..." &&
      cub kafka-ready -b kafka:9092 1 30 &&
      kafka-topics --create --if-not-exists --topic transactions --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 &&
      kafka-topics --create --if-not-exists --topic featured-transactions --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 &&
      kafka-topics --create --if-not-exists --topic reconstruction-errors --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 &&
      kafka-topics --create --if-not-exists --topic alerts --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 &&
      kafka-topics --create --if-not-exists --topic explanations --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 &&
      kafka-topics --create --if-not-exists --topic performance-metrics --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3
      '

  ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    container_name: ingestion
    restart: on-failure
    depends_on:
      - kafka
    volumes:
      - ./data:/data
      - ./ingestion:/app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATA_FILE_PATH: /data/PS_20174392719_1491204439457_log.csv
      STREAM_SPEED_SEC: "0.1"

  feature-engineering:
    build:
      context: ./feature_engineering
      dockerfile: Dockerfile
    container_name: feature-engineering
    restart: on-failure
    depends_on:
      - kafka
      - kafka-topics-init
    volumes:
      - ./feature_engineering:/app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  model-inference:
    build:
      context: ./model_inference
      dockerfile: Dockerfile
    container_name: model-inference
    restart: on-failure
    depends_on:
      - kafka
      - feature-engineering
    volumes:
      - ./model_inference:/app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  scoring:
    build:
      context: ./scoring
      dockerfile: Dockerfile
    container_name: scoring
    restart: on-failure
    depends_on:
      - kafka
      - model-inference
    volumes:
      - ./scoring:/app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    restart: on-failure
    depends_on:
      - kafka
      - scoring
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092